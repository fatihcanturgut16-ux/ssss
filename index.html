  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t baskı \"Come Back to Bed\" yatak odası çizimi (mavi), ön göğüste SIMPLE SAMPLE logosu. Oversize kalıp, yumuşak beyaz pamuk.' },\n    { id:'s1', name:'The Moment Tee', color:'Krem', weight:'220 gr', price:1200, shopier:'https://www.shopier.com/simplesamplestudio/48584885', img:'images/moment-back.jpg', imgs:['images/moment-back.jpg','images/moment-front.jpg'], desc:'Sırt baskı \"The Moment\" pencere & deniz manzarası grafiği (mavi), ön göğüste SIMPLE SAMPLE logosu. Oversize kalıp, yumuşak krem pamuk.' },\n    { id:'e3', name:'Play It Twice Tee', color:'Beyaz', weight:'240 gr', price:1200, shopier:'https://www.shopier.com/simplesamplestudio/48584846', img:'images/twice-back.jpg', imgs:['images/twice-back.jpg','images/twice-front.jpg'], desc:'Sırt baskı \"If It\\u2019s Nice Play It Twice\" plak çizimi (kırmızı), ön göğüste SIMPLE SAMPLE logosu. Turgood Music ile sınırlı sayıda üretilen ortak koleksiyon parçası. Oversize kalıp, yumuşak beyaz pamuk.' },\n    { id:'e1', name:'Send Me Your Playlist Tee', color:'Siyah', weight:'240 gr', price:850, shopier:'https://www.shopier.com/simplesamplestudio/48583314', img:'images/turgood-playlist.jpg', desc:'Sırt baskı \"send me your playlist.\" sloganı. Turgood Music ile sınırlı sayıda üretilen ortak koleksiyon parçası. Oversize kalıp, ağır gramajlı siyah örme.' },\n  ];\n\n  shopierStore = 'https://www.shopier.com/simplesamplestudio';\n  state = { page:'home', selId:'p12', size:'M', cart:[], added:false, filter:'all', gimg:0 };\n  _t = null;\n\n  fmt(n){ return '₺' + n.toLocaleString('tr-TR'); }\n\n  nav(page){ if(this._t){clearTimeout(this._t);} this.setState({ page, added:false }); try{ window.scrollTo(0,0); }catch(e){} }\n\n  pick(id){ if(this._t){clearTimeout(this._t);} this.setState({ page:'product', selId:id, size:'M', added:false, gimg:0 }); try{ window.scrollTo(0,0); }catch(e){} }\n\n  add(){\n    const sel = this.products.find(p=>p.id===this.state.selId);\n    if(!sel) return;\n    const key = sel.id + '-' + this.state.size;\n    const cart = this.state.cart.slice();\n    const ex = cart.find(c=>c.key===key);\n    if(ex){ ex.qty += 1; } else { cart.push({ key, id:sel.id, size:this.state.size, qty:1 }); }\n    this.setState({ cart, added:true });\n    if(this._t){clearTimeout(this._t);}\n    this._t = setTimeout(()=>this.setState({ added:false }), 1600);\n  }\n\n  chgQty(key, d){\n    let cart = this.state.cart.slice();\n    const it = cart.find(c=>c.key===key);\n    if(!it) return;\n    it.qty += d;\n    if(it.qty <= 0){ cart = cart.filter(c=>c.key!==key); }\n    this.setState({ cart });\n  }\n\n  remove(key){ this.setState({ cart: this.state.cart.filter(c=>c.key!==key) }); }\n\n  openBuy(id){\n    const p = this.products.find(x=>x.id===id);\n    const url = (p && p.shopier) ? p.shopier : this.shopierStore;\n    try{ window.open(url, '_blank', 'noopener'); }catch(e){ location.href = url; }\n  }\n\n  renderVals(){\n    const { page, selId, size, cart, added, filter } = this.state;\n    const COL = { s1:'summer', s2:'summer', p3:'collab2', e1:'collab3', e3:'collab3', p13:'cafe', p12:'cafe', p2:'cafe', p8:'cafe', p9:'cycling', p10:'cycling', p11:'cycling' };\n    const ph = 'linear-gradient(160deg,#1a1a1a,#2c2c2c)';\n    const SALE = 1200, ORIG = 1500;\n    const dec = p => ({ ...p, priceStr:this.fmt(SALE), origStr:this.fmt(ORIG), meta:p.color, noImg:!p.img, bgImg: p.img ? ('url(\"'+p.img+'\")') : ph, onSelect:()=>this.pick(p.id) });\n\n    const products = this.products.map(dec);\n    const featured = [\n      this.products.find(p=>p.id==='p2'),\n      this.products.find(p=>p.id==='p3'),\n      this.products.find(p=>p.id==='p8'),\n    ].map(dec);\n\n    const selRaw = this.products.find(p=>p.id===selId) || this.products[0];\n    const galleryImgs = selRaw.imgs || (selRaw.img ? [selRaw.img] : []);\n    const gidx = Math.min(this.state.gimg||0, Math.max(0, galleryImgs.length-1));\n    const mainImg = galleryImgs[gidx];\n    const gallery = galleryImgs.map((src,i)=>({ bgImg:'url(\"'+src+'\")', onPick:()=>this.setState({ gimg:i }), border: i===gidx?'#fff':'transparent' }));\n    const sel = { ...selRaw, priceStr:this.fmt(SALE), origStr:this.fmt(ORIG), meta:selRaw.color,\n      noImg:!mainImg, bgImg: mainImg ? ('url(\"'+mainImg+'\")') : ph, gallery, hasGallery: gallery.length>1 };\n\n    const sizes = ['S','M','L','XL'].map(s=>{\n      const on = s===size;\n      return { label:s, onPick:()=>this.setState({ size:s, added:false }),\n        bg: on ? '#fff' : 'transparent', color: on ? '#0a0a0a' : '#fff', border: on ? '#fff' : '#444' };\n    });\n\n    const cartLines = cart.map(c=>{\n      const p = this.products.find(x=>x.id===c.id);\n      return { name:p.name, size:c.size, qty:c.qty, meta:p.color,\n        lineTotal:this.fmt(SALE*c.qty), lineOrig:this.fmt(ORIG*c.qty),\n        onInc:()=>this.chgQty(c.key, 1), onDec:()=>this.chgQty(c.key, -1), onRemove:()=>this.remove(c.key) };\n    });\n    const cartQtyN = cart.reduce((s,c)=>s+c.qty,0);\n    const subtotalN = SALE * cartQtyN;\n    const cartCount = cart.reduce((s,c)=>s+c.qty,0);\n\n    const colDefs = [\n      { key:'summer', label:'Summer', desc:'Yaz, kahve ve sakin anlar üzerine grafik baskılar.' },\n      { key:'collab2', label:'Simple Sample × Swegy', desc:'Swegy ile tasarlanan slogan baskılı sınırlı seri.', collab:true, logo:'images/swegy-logo.png', logoH:52, logoW:121 },\n      { key:'collab3', label:'Simple Sample × Turgood Music', desc:'Turgood Music ile sahne ve tur temalı sınırlı seri.', collab:true, logo:'images/turgood-logo.png', logoH:56, logoW:133 },\n      { key:'cafe', label:'Café Club', desc:'Kahve, kokteyl ve gündelik tutkular üzerine esprili baskılar.' },\n      { key:'cycling', label:'Cycling Club', desc:'İki teker tutkunları için sürüş temalı baskılar.' },\n    ];\n    const shopCols = colDefs.filter(c=> filter==='all' || c.key===filter).map(c=>{\n      const items = products.filter(p=>COL[p.id]===c.key);\n      return { ...c, items, count: items.length + ' ürün', notCollab: !c.collab,\n        hasLogo: !!(c.collab && c.logo), noLogo: !!(c.collab && !c.logo), partner: c.partner || '',\n        logoBg: c.logo ? ('url(\"'+c.logo+'\")') : 'none',\n        accent: c.collab ? '#ff5fa2' : '#fff', divider: c.collab ? '#ff5fa2' : '#222',\n        countColor: c.collab ? '#ff9ec9' : '#888' };\n    });\n    const chips = [\n      { key:'all', label:'HEPSİ' },\n      { key:'summer', label:'SUMMER' },\n      { key:'collab2', label:'SWEGY' },\n      { key:'collab3', label:'TURGOOD' },\n      { key:'cafe', label:'CAFÉ CLUB' },\n      { key:'cycling', label:'CYCLING CLUB' },\n    ].map(ch=>{\n      const on = filter===ch.key;\n      return { ...ch, onPick:()=>this.setState({ filter:ch.key }),\n        bg: on?'#fff':'transparent', color: on?'#0a0a0a':'#bbb', border: on?'#fff':'#333' };\n    });\n\n    return {\n      isHome: page==='home', isShop: page==='shop', isProduct: page==='product',\n      chips, shopCols,\n      isCart: page==='cart', isContact: page==='contact',\n      goHome:()=>this.nav('home'), goShop:()=>this.nav('shop'), goCart:()=>this.nav('cart'), goContact:()=>this.nav('contact'),\n      goShopier:()=>{ try{ window.open(this.shopierStore,'_blank','noopener'); }catch(e){ location.href=this.shopierStore; } },\n      onBuy:()=>this.openBuy(selId),\n      products, featured, productCount:this.products.length,\n      sel, sizes, onAdd:()=>this.add(), addLabel: added ? 'SEPETE EKLENDİ ✓' : 'SEPETE EKLE',\n      cartLines, cartCount, hasItems: cart.length>0, cartEmpty: cart.length===0,\n      subtotal:this.fmt(subtotalN), total:this.fmt(subtotalN),\n      subtotalOrig:this.fmt(ORIG*cartQtyN),\n      savedStr:this.fmt((ORIG-SALE)*cartQtyN),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
